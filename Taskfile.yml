version: "3"

tasks:
  default:
    desc: Show available commands
    cmds:
      - rtk task --list

  install:
    desc: Install Bun and Go dependencies
    cmds:
      - rtk bun install --ignore-scripts
      - rtk go mod download

  doctor:
    desc: Verify required tools and local runtime configuration
    cmds:
      - |
        rtk test -f .env || { rtk echo "missing .env; run: cp .env.example .env" >&2; exit 1; }
        for tool in go bun task docker; do rtk command -v "$tool" >/dev/null || { rtk echo "missing required tool: $tool" >&2; exit 1; }; done
        rtk docker compose version >/dev/null
        rtk go test ./apps/migrate -run TestRunAppliesPrismaBeforeRiver -count=1

  dev:
    desc: Run default services, or selected services after --
    cmds:
      - |
        {{if .CLI_ARGS}}
        {{range .CLI_ARGS_LIST}}case "{{.}}" in web|worker|scheduler|realtime) ;; *) rtk echo "unsupported dev service: {{.}}" >&2; exit 1;; esac
        {{end}}rtk task --parallel --output=interleaved {{range .CLI_ARGS_LIST}}dev:{{.}} {{end}}
        {{else}}rtk task --parallel --output=interleaved dev:web dev:worker dev:scheduler
        {{end}}

  dev:web:
    desc: Run TanStack Start with embedded Elysia
    cmds:
      - rtk bun run dev:web

  dev:worker:
    desc: Run the Go River worker with Air
    cmds:
      - rtk go tool air -c dev/air/worker.toml

  dev:scheduler:
    desc: Run the Bun River scheduler
    cmds:
      - rtk bun run dev:scheduler

  dev:realtime:
    desc: Run the Socket.IO runtime
    cmds:
      - rtk bun run dev:realtime

  start:
    desc: Start the built web app
    cmds:
      - rtk bun run start:web

  start:jobs:
    desc: Start the Go worker and Bun scheduler
    cmds:
      - rtk task --parallel --output=interleaved start:worker start:scheduler

  start:worker:
    desc: Start the built Go worker
    cmds:
      - rtk go run ./apps/worker

  start:scheduler:
    desc: Start the built Bun scheduler
    cmds:
      - rtk bun run start:scheduler

  start:realtime:
    desc: Start the built Socket.IO runtime
    cmds:
      - rtk bun run start:realtime

  migrate:
    desc: Apply Prisma and River migrations
    cmds:
      - rtk go run ./apps/migrate

  test:
    desc: Run TypeScript and Go tests
    cmds:
      - rtk bun test apps/api apps/web apps/scheduler apps/realtime packages
      - rtk go test ./... -count=1

  test:go:
    desc: Run Go tests
    cmds:
      - rtk go test ./... -count=1

  quality:
    desc: Run tests, lint, typechecks, and Go vet
    cmds:
      - rtk task test
      - rtk bun run lint
      - rtk bun run check-types
      - rtk go vet ./...

  build:
    desc: Build TypeScript and Go runtimes
    cmds:
      - rtk bun run build
      - rtk task build:go

  build:go:
    desc: Build the Go worker and migration runtime
    cmds:
      - rtk go build ./apps/worker ./apps/migrate

  lint:
    desc: Lint all TypeScript workspaces
    cmds:
      - rtk bun run lint

  check-types:
    desc: Typecheck all TypeScript workspaces
    cmds:
      - rtk bun run check-types

  db:generate:
    desc: Generate the Prisma client
    dir: packages/database
    cmds:
      - rtk bun run db:generate

  db:migrate:
    desc: Apply Prisma migrations through the migration runtime
    cmds:
      - rtk task migrate

  web:health:
    desc: Check the embedded Elysia health endpoint
    cmds:
      - rtk curl --fail http://localhost:4100/health

  api:status:
    desc: Check the embedded Elysia status endpoint
    cmds:
      - rtk curl --fail http://localhost:4100/api/status
